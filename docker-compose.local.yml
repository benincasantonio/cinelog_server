name: cinelog-local

services:
  mongo:
    image: mongo:8
    container_name: cinelog_mongo_local
    command: ["mongod", "--replSet", "rs0"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval 'db.runCommand("ping").ok' --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cinelog_redis_local
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinelog_api_local
    ports:
      - "5009:5009"
    env_file:
      - .env
    volumes:
      - .:/app
      - api_venv:/app/.venv
    environment:
      - MONGODB_HOST=mongo
      - MONGODB_PORT=27017
      - MONGODB_DB=cinelog_db
      - SMTP_SERVER=mailpit
      - SMTP_PORT=1025
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
    command: uv run uvicorn app:app --host 0.0.0.0 --port 5009 --reload --reload-dir app
    depends_on:
      mongo-init-replica:
        condition: service_started
      mailpit:
        condition: service_started
      redis:
        condition: service_healthy

  mongo-init-replica:
    image: mongo:8
    container_name: cinelog_mongo_init
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      mongosh --host mongo:27017 --eval '
        try { rs.initiate({_id: "rs0", members: [{_id: 0, host: "mongo:27017"}]}) }
        catch(e) { if (e.codeName !== "AlreadyInitialized") throw e; }
      '

  mailpit:
    image: axllent/mailpit
    container_name: cinelog_mailpit_local
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI


volumes:
  mongo_data:
  redis_data:
  api_venv:
