[project]
name = "cinelog-server"
version = "0.1.0"
description = "Cinelog FastAPI backend"
requires-python = ">=3.12"
dependencies = [
    "beanie==2.0.1",
    "bcrypt==5.0.0",
    "fastapi==0.135.1",
    "httpx==0.28.1",
    "passlib[bcrypt]==1.7.4",
    "pydantic[email]==2.12.5",
    "PyJWT==2.12.1",
    "python-dotenv==1.2.2",
    "python-multipart==0.0.22",
    "redis[hiredis]==7.3.0",
    "uvicorn==0.42.0",
]

[dependency-groups]
dev = [
    "bandit==1.9.4",
    "freezegun==1.5.5",
    "mypy==1.19.1",
    "mongomock-motor==0.0.36",
    "pytest==9.0.2",
    "pytest-asyncio==1.3.0",
    "pytest-cov==7.0.0",
    "ruff==0.15.6",
    "types-passlib==1.7.7.20260211",
    "pip-audit>=2.10.0",
]

[tool.bandit]
exclude_dirs = ["tests"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
